function getOpts(type,cur){const l=WEIGHTS[type]||[];if(!l.length)return[];const b=cur||0;const o=l.filter(w=>w>=Math.max(0,b-25)&&w<=b+35);if(cur&&!o.includes(cur))o.push(cur);o.sort((a,b)=>a-b);return o}

const DAYS=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const PC=["#4285f4","#34a853","#fbbc04","#ea4335"];

const SK="rf_v5";
const ld=()=>{try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r)}catch{}return null};
const sv=s=>{try{localStorage.setItem(SK,JSON.stringify(s))}catch{}};

function buildSessions(td,total){
  const w={};
  Object.keys(td).forEach(k=>{
    w[k]={cur:0,sessions:Array.from({length:total},()=>({
      status:null,exercises:td[k].exercises.map(e=>({weight:e.initWeight,sets:Array(e.sets).fill(false)}))
    }))};
  });
  return w;
}

function init(){
  const s=ld();
  if(s&&s.v===5)return s;
  const start=new Date();const end=new Date(start);end.setDate(end.getDate()+16*7);
  return{v:5,td:JSON.parse(JSON.stringify(DEFAULT_DATA)),w:buildSessions(DEFAULT_DATA,16),startDate:start.toISOString(),endDate:end.toISOString(),total:16,dark:false,phases:true};
}

// progression indicator: compare last 2 completed sessions weights
function getProgression(wk,exIdx,state){
  const w=state.w[wk];if(!w)return null;
  const completed=[];
  for(let i=0;i<w.sessions.length;i++){
    if(w.sessions[i].status==="done"&&w.sessions[i].exercises[exIdx]){
      completed.push(w.sessions[i].exercises[exIdx].weight);
    }
  }
  if(completed.length<2)return null;
  const prev=completed[completed.length-2],curr=completed[completed.length-1];
  if(prev==null||curr==null)return null;
  if(curr>prev)return"up";
  if(curr<prev)return"down";
  return"same";
}

// ── REST TIMER ───────────────────────────────────────────────
function RestTimer({seconds,onClose}){
  const t=useT();
  const[rem,setRem]=useState(seconds);
  const[run,setRun]=useState(true);
  const ref=useRef(null);
  useEffect(()=>{if(run&&rem>0)ref.current=setInterval(()=>setRem(r=>r-1),1000);return()=>clearInterval(ref.current)},[run,rem]);
  useEffect(()=>{if(rem<=0){clearInterval(ref.current);try{navigator.vibrate?.(500)}catch{};setTimeout(onClose,1200)}},[rem]);
  const pct=((seconds-rem)/seconds)*100;
  const m=Math.floor(Math.abs(rem)/60),s=Math.abs(rem)%60;
  const display=`${rem<0?"+":""}${m}:${s.toString().padStart(2,"0")}`;
  const done=rem<=0;
  return(
    <div style={{position:"fixed",inset:0,background:t.timerBg,zIndex:100,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:200,height:200,borderRadius:"50%",background:`conic-gradient(${done?t.red:t.accent} ${pct}%, ${t.border} ${pct}%)`,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{width:174,height:174,borderRadius:"50%",background:t.timerCircle,display:"flex",alignItems:"center",justifyContent:"center",fontSize:48,fontWeight:300,color:done?t.red:t.text,letterSpacing:2}}>{display}</div>
      </div>
      <p style={{color:done?t.red:t.textSec,marginTop:28,fontSize:13,fontWeight:600,letterSpacing:2,textTransform:"uppercase"}}>{done?"Finalizado":"Descansando"}</p>
      <div style={{display:"flex",gap:12,marginTop:28}}>
        {!done&&<button onClick={()=>setRun(!run)} style={{padding:"12px 28px",borderRadius:100,border:`1px solid ${t.border}`,background:t.card,color:t.text,fontSize:14,fontWeight:500,display:"flex",alignItems:"center",gap:8}}>
          <I d={run?IC.pause:IC.play} s={16} c={t.text}/>{run?"Pausar":"Retomar"}
        </button>}
        {!done&&<button onClick={onClose} style={{padding:"12px 28px",borderRadius:100,border:"none",background:t.cardAlt,color:t.text,fontSize:14,fontWeight:500}}>Fechar</button>}
      </div>
    </div>
  );
}

// ── WEIGHT PICKER ────────────────────────────────────────────
function WP({value,type,onChange}){
  const t=useT();const ref=useRef(null);const opts=getOpts(type,value);
  useEffect(()=>{if(ref.current&&value!=null){const i=opts.indexOf(value);if(i>=0){const el=ref.current.children[i];if(el)el.scrollIntoView({inline:"center",behavior:"smooth"})}}},[value]);
  if(!opts.length)return null;
  return(
    <div style={{marginTop:8}}>
      <div style={{fontSize:10,color:t.textSec,marginBottom:6,fontWeight:600,letterSpacing:1.5,textTransform:"uppercase"}}>{TL[type]||type} — kg</div>
      <div ref={ref} style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,scrollSnapType:"x mandatory",scrollbarWidth:"none"}}>
        {opts.map(w=><button key={w} onClick={()=>onChange(w)} style={{scrollSnapAlign:"center",minWidth:50,height:42,borderRadius:100,border:w===value?`2px solid ${t.accent}`:`1px solid ${t.border}`,background:w===value?t.accentBg:t.card,color:w===value?t.accentDark:t.textSec,fontWeight:w===value?700:400,fontSize:15,flexShrink:0,transition:"all .15s"}}>{w}</button>)}
      </div>
    </div>
  );
}

// ── PROGRESSION BADGE ────────────────────────────────────────
function ProgBadge({dir}){
  const t=useT();
  if(!dir)return null;
  const cfg={up:{icon:IC.up,color:t.green,bg:t.greenBg,label:"Subiu"},down:{icon:IC.down,color:t.red,bg:t.redBg,label:"Desceu"},same:{icon:IC.same,color:t.yellow,bg:"rgba(251,188,4,.12)",label:"Manteve"}};
  const c=cfg[dir];
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,background:c.bg,color:c.color,fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:100,marginLeft:6}}><I d={c.icon} s={12} c={c.color}/>{c.label}</span>;
}

// ── EXERCISE CARD ────────────────────────────────────────────
function ExCard({ex,data,onUpdate,onRest,prog}){
  const t=useT();
  const[open,setOpen]=useState(false);
  const done=data.sets.filter(Boolean).length;const all=done===ex.sets;
  const pR=s=>{if(!s)return 90;const m=s.match(/(\d+)/);return s.includes("min")?parseInt(m?.[1]||"2")*60:parseInt(m?.[1]||"90")};
  return(
    <div className="fi" style={{background:all?t.greenBg:t.card,border:`1px solid ${all?t.greenBorder:t.border}`,borderRadius:20,padding:"16px 18px",transition:"all .2s"}}>
      <div onClick={()=>setOpen(!open)} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:600,color:all?t.green:t.text,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            {all&&<I d={IC.check} s={16} c={t.green}/>}{ex.name}<ProgBadge dir={prog}/>
          </div>
          <div style={{fontSize:12,color:t.textSec,marginTop:3}}>{ex.sets}×{ex.reps} · {ex.rest}{data.weight!=null&&` · ${data.weight} kg`}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          {data.sets.map((d,i)=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:d?t.accent:t.border,transition:"all .2s"}}/>)}
          <span style={{marginLeft:6,transform:open?"rotate(180deg)":"",transition:"transform .2s",display:"inline-flex"}}><I d={IC.chevron} s={16} c={t.textSec}/></span>
        </div>
      </div>
      {open&&<div style={{marginTop:16}}>
        {ex.initWeight!=null&&<WP value={data.weight} type={ex.type} onChange={w=>onUpdate({...data,weight:w})}/>}
        <div style={{marginTop:14}}>
          <div style={{fontSize:10,color:t.textSec,marginBottom:8,fontWeight:600,letterSpacing:1.5}}>SÉRIES</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {data.sets.map((d,i)=><button key={i} onClick={()=>{const n=[...data.sets];n[i]=!n[i];onUpdate({...data,sets:n});if(!d)onRest(pR(ex.rest))}} style={{width:54,height:54,borderRadius:16,border:d?"none":`1px solid ${t.border}`,background:d?t.accent:t.card,color:d?"#fff":t.textSec,fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
              {d?<I d={IC.check} s={18} c="#fff"/>:i+1}
            </button>)}
          </div>
        </div>
      </div>}
    </div>
  );
}

// ── EDIT EXERCISE MODAL ──────────────────────────────────────
function EditModal({td,wk,exIdx,onSave,onDelete,onClose,isNew}){
  const t=useT();

  const lbl={fontSize:10,color:t.textSec,fontWeight:600,letterSpacing:1.5,display:"block",marginBottom:4,textTransform:"uppercase"};
  return(
    <div style={{position:"fixed",inset:0,background:t.overlay,zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:t.bg,borderRadius:"24px 24px 0 0",padding:28,width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <h2 style={{fontSize:18,fontWeight:700,color:t.text}}>{isNew?"Novo exercício":"Editar exercício"}</h2>
          <button onClick={onClose} style={{background:t.cardAlt,border:"none",borderRadius:12,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={IC.close} s={18} c={t.textSec}/></button>
        </div>
        <label style={lbl}>Nome</label>
        <input value={name} onChange={e=>setName(e.target.value)} style={inp} placeholder="Ex: Supino reto"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><label style={lbl}>Séries</label><input type="number" value={sets} onChange={e=>setSets(parseInt(e.target.value)||1)} min="1" max="10" style={inp}/></div>
          <div><label style={lbl}>Repetições</label><input value={reps} onChange={e=>setReps(e.target.value)} style={inp} placeholder="8–12"/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><label style={lbl}>Descanso</label><input value={rest} onChange={e=>setRest(e.target.value)} style={inp} placeholder="60–90s"/></div>
          <div><label style={lbl}>Peso inicial (kg)</label><input type="number" value={weight||""} onChange={e=>setWeight(e.target.value?parseFloat(e.target.value):null)} step="0.5" style={inp} placeholder="—"/></div>
        </div>
        <label style={lbl}>Equipamento</label>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:20}}>
          {TYPES.map(tp=><button key={tp} onClick={()=>setType(tp)} style={{padding:"8px 14px",borderRadius:100,border:tp===type?`2px solid ${t.accent}`:`1px solid ${t.border}`,background:tp===type?t.accentBg:t.card,color:tp===type?t.accentDark:t.textSec,fontSize:12,fontWeight:tp===type?600:400}}>{TL[tp]}</button>)}
        </div>
        <div style={{display:"flex",gap:10}}>
          {!isNew&&<button onClick={()=>{onDelete();onClose()}} style={{flex:1,padding:14,borderRadius:14,background:t.redBg,border:"none",color:t.red,fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><I d={IC.trash} s={16} c={t.red}/>Excluir</button>}
          <button onClick={()=>{if(!name.trim())return;onSave({name,sets,reps,rest,initWeight:weight,type});onClose()}} style={{flex:2,padding:14,borderRadius:14,background:t.accent,border:"none",color:"#fff",fontSize:14,fontWeight:700}}>Salvar</button>
        </div>
      </div>
    </div>
  );
}

// ── PLAN SETTINGS ────────────────────────────────────────────
function PlanModal({state,setState,onClose}){
  const t=useT();
  const[total,setTotal]=useState(state.total||16);
  const[startD,setStartD]=useState(state.startDate?.slice(0,10)||"");
  const[phases,setPhases]=useState(state.phases!==false);
  const apply=()=>{
    const s=new Date(startD);const e=new Date(s);e.setDate(e.getDate()+total*7);
    setState(p=>{
      const n={...JSON.parse(JSON.stringify(p)),startDate:s.toISOString(),endDate:e.toISOString(),total,phases};
      if(total!==p.total){
        const newW={};
        Object.keys(n.td).forEach(k=>{
          const old=n.w[k];
          newW[k]={cur:Math.min(old?.cur||0,total-1),sessions:Array.from({length:total},(_,i)=>{
            if(old?.sessions[i])return old.sessions[i];
            return{status:null,exercises:n.td[k].exercises.map(e=>({weight:e.initWeight,sets:Array(e.sets).fill(false)}))};
          })};
        });
        n.w=newW;
      }
      return n;
    });
    onClose();
  };
  const inp={width:"100%",padding:"12px 14px",borderRadius:12,border:`1px solid ${t.border}`,background:t.inputBg,color:t.text,fontSize:15,outline:"none",marginBottom:14};
  return(
    <div style={{position:"fixed",inset:0,background:t.overlay,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:t.bg,borderRadius:24,padding:28,width:"100%",maxWidth:380}}>
        <h2 style={{fontSize:18,fontWeight:700,marginBottom:24,color:t.text,display:"flex",alignItems:"center",gap:10}}><I d={IC.calendar} s={20} c={t.accent}/>Configurar plano</h2>
        <label style={{fontSize:10,color:t.textSec,fontWeight:600,letterSpacing:1,display:"block",marginBottom:4}}>DATA DE INÍCIO</label>
        <input type="date" value={startD} onChange={e=>setStartD(e.target.value)} style={inp}/>
        <label style={{fontSize:10,color:t.textSec,fontWeight:600,letterSpacing:1,display:"block",marginBottom:4}}>SESSÕES POR TREINO</label>
        <input type="number" min="1" max="52" value={total} onChange={e=>setTotal(parseInt(e.target.value)||16)} style={inp}/>
        <div onClick={()=>setPhases(!phases)} style={{display:"flex",alignItems:"center",gap:10,padding:14,background:t.card,borderRadius:12,border:`1px solid ${t.border}`,marginBottom:14,cursor:"pointer"}}>
          <div style={{width:44,height:26,borderRadius:13,background:phases?t.accent:t.border,padding:2,transition:"all .2s",display:"flex",alignItems:phases?"center":"center",justifyContent:phases?"flex-end":"flex-start"}}>
            <div style={{width:22,height:22,borderRadius:11,background:"#fff",transition:"all .2s"}}/>
          </div>
          <div><div style={{fontSize:14,fontWeight:500,color:t.text}}>Fases de periodização</div><div style={{fontSize:11,color:t.textSec}}>Adaptação → Construção → Intensificação → Pico</div></div>
        </div>
        {startD&&<p style={{fontSize:12,color:t.textSec,marginBottom:16}}>Término: {new Date(new Date(startD).getTime()+total*7*86400000).toLocaleDateString("pt-BR")}</p>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:14,borderRadius:14,background:t.cardAlt,border:"none",color:t.textSec,fontSize:14,fontWeight:500}}>Cancelar</button>
          <button onClick={apply} style={{flex:1,padding:14,borderRadius:14,background:t.accent,border:"none",color:"#fff",fontSize:14,fontWeight:700}}>Salvar</button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────
function App(){
  const[state,setState]=useState(init);
  const[active,setActive]=useState(null);
  const[timer,setTimer]=useState(null);
  const[view,setView]=useState("home");
  const[hd,setHd]=useState(null);
  const[showPlan,setShowPlan]=useState(false);
  const[showNewWk,setShowNewWk]=useState(false);
  const[editEx,setEditEx]=useState(null);

  const dark=state.dark;
  const t=dark?themes.dark:themes.light;

  useEffect(()=>{sv(state)},[state]);
  useEffect(()=>{document.body.style.background=t.bg;document.body.style.color=t.text;document.getElementById("tc").content=t.bg},[dark]);

  const td=state.td;const WK=Object.keys(td);const TOTAL=state.total||16;
  const PPH=Math.max(1,Math.floor(TOTAL/4));
  const ph=s=>Math.min(Math.floor(s/PPH),3);

  const upEx=useCallback((wk,si,ei,d)=>{setState(p=>{const n=JSON.parse(JSON.stringify(p));n.w[wk].sessions[si].exercises[ei]=d;return n})},[]);

  const complete=useCallback((wk,status)=>{
    setState(p=>{
      const n=JSON.parse(JSON.stringify(p));const w=n.w[wk];const s=w.sessions[w.cur];
      s.status=status;s.at=new Date().toISOString();
      if(status==="done"&&w.cur<TOTAL-1){const nx=w.sessions[w.cur+1];s.exercises.forEach((e,i)=>{if(e.weight!=null&&nx.exercises[i])nx.exercises[i].weight=e.weight})}
      w.cur=Math.min(w.cur+1,TOTAL-1);return n;
    });setActive(null);setView("home");
  },[TOTAL]);

  const saveExEdit=(wk,idx,data)=>{
    setState(p=>{
      const n=JSON.parse(JSON.stringify(p));
      if(idx===undefined){n.td[wk].exercises.push(data);Object.values(n.w[wk].sessions).forEach(s=>{if(!s.status)s.exercises.push({weight:data.initWeight,sets:Array(data.sets).fill(false)})})}
      else{const old=n.td[wk].exercises[idx];n.td[wk].exercises[idx]=data;if(data.sets!==old.sets){n.w[wk].sessions.forEach(s=>{if(!s.status&&s.exercises[idx])s.exercises[idx].sets=Array(data.sets).fill(false)})}}
      return n;
    });
  };
  const deleteEx=(wk,idx)=>{setState(p=>{const n=JSON.parse(JSON.stringify(p));n.td[wk].exercises.splice(idx,1);n.w[wk].sessions.forEach(s=>{if(s.exercises[idx])s.exercises.splice(idx,1)});return n})};

  const createWorkout=(name,dayOfWeek)=>{
    setState(p=>{
      const n=JSON.parse(JSON.stringify(p));
      n.td[name]={dayLabel:DAYS[dayOfWeek],dayOfWeek,exercises:[]};
      n.w[name]={cur:0,sessions:Array.from({length:TOTAL},()=>({status:null,exercises:[]}))};
      return n;
    });
  };

  const deleteWorkout=(wk)=>{
    setState(p=>{const n=JSON.parse(JSON.stringify(p));delete n.td[wk];delete n.w[wk];return n});
  };

  const daysLeft=()=>{if(!state.endDate)return null;const d=Math.ceil((new Date(state.endDate)-new Date())/86400000);return d>0?d:0};

  // find "next" workout: one with fewest completed sessions (most behind)
  const nextWk=useMemo(()=>{
    let min=Infinity,pick=null;
    WK.forEach(k=>{const w=state.w[k];if(!w)return;const done=w.sessions.filter(s=>s.status).length;if(done<min&&w.cur<TOTAL){min=done;pick=k}});
    return pick;
  },[state,WK,TOTAL]);

  // ── HOME ──
  if(view==="home"){
    const totalDone=WK.reduce((s,k)=>s+(state.w[k]?.sessions.filter(x=>x.status==="done").length||0),0);
    const total=WK.length*TOTAL;const pct=total?Math.round(totalDone/total*100):0;const dl=daysLeft();
    return(
      <TC.Provider value={t}>
      <div style={{minHeight:"100dvh",maxWidth:480,margin:"0 auto",background:t.bg}}>
        {showPlan&&<PlanModal state={state} setState={setState} onClose={()=>setShowPlan(false)}/>}
        {showNewWk&&<NewWorkoutModal onSave={createWorkout} onClose={()=>setShowNewWk(false)}/>}
        {editEx&&<EditModal td={td} wk={editEx.wk} exIdx={editEx.idx} isNew={editEx.isNew} onSave={d=>saveExEdit(editEx.wk,editEx.idx,d)} onDelete={()=>deleteEx(editEx.wk,editEx.idx)} onClose={()=>setEditEx(null)}/>}

        <div style={{padding:"28px 20px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <h1 style={{fontSize:28,fontWeight:800,letterSpacing:-.5,color:t.text}}>
              <span style={{background:`linear-gradient(135deg,${t.accent},${t.accentDark})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Rep</span>Forge
            </h1>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setState(p=>({...p,dark:!p.dark}))} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={dark?IC.sun:IC.moon} s={18} c={t.textSec}/></button>
              <button onClick={()=>setShowPlan(true)} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={IC.calendar} s={18} c={t.textSec}/></button>
              <button onClick={()=>setView("history")} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={IC.history} s={18} c={t.textSec}/></button>
            </div>
          </div>
        </div>

        <div style={{padding:"0 20px 16px"}}>
          <div style={{background:t.card,borderRadius:24,padding:20,border:`1px solid ${t.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}>
              <span style={{fontSize:13,color:t.textSec,fontWeight:500}}>Progresso</span>
              <span style={{fontSize:13,color:t.accent,fontWeight:600}}>{totalDone}/{total}</span>
            </div>
            <div style={{height:6,background:t.cardAlt,borderRadius:3}}>
              <div style={{height:6,borderRadius:3,background:`linear-gradient(90deg,${t.accent},${t.accentDark})`,width:`${pct}%`,transition:"width .5s"}}/>
            </div>
            {state.phases&&<div style={{display:"flex",justifyContent:"space-between",marginTop:14}}>
              {["Adaptação","Construção","Intensificação","Pico"].map((l,i)=>{const isA=WK.some(k=>state.w[k]&&ph(state.w[k].cur)===i);return<span key={i} style={{fontSize:10,fontWeight:isA?700:400,color:PC[i],opacity:isA?1:.3,letterSpacing:.5}}>{l}</span>})}
            </div>}
            {dl!==null&&<div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${t.cardAlt}`,display:"flex",justifyContent:"space-between",fontSize:12,color:t.textSec}}>
              <span>{state.startDate&&new Date(state.startDate).toLocaleDateString("pt-BR")} → {state.endDate&&new Date(state.endDate).toLocaleDateString("pt-BR")}</span>
              <span style={{fontWeight:600,color:dl<14?t.red:t.textSec}}>{dl}d</span>
            </div>}
          </div>
        </div>

        <div style={{padding:"0 20px 100px"}}>
          <h2 style={{fontSize:12,color:t.textSec,marginBottom:14,fontWeight:600,letterSpacing:1.5}}>PRÓXIMAS SESSÕES</h2>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {WK.map(k=>{
              const w=state.w[k];if(!w)return null;
              const s=w.cur;const p=ph(s);const d=td[k];
              const isDone=s>=TOTAL||(s===TOTAL-1&&w.sessions[s]?.status);
              const isNext=k===nextWk&&!isDone;
              return(
                <div key={k} className="fi" style={{background:isNext?t.accentBg:t.card,borderRadius:20,padding:18,border:isNext?`2px solid ${t.accent}`:`1px solid ${isDone?t.greenBorder:t.border}`,opacity:isDone?.4:1}}>
                  <div onClick={()=>{if(!isDone){setActive(k);setView("workout")}}} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        {state.phases&&<span style={{background:PC[p]+"18",color:PC[p],fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:100}}>{["Adaptação","Construção","Intensificação","Pico"][p]}</span>}
                        <span style={{fontSize:10,color:t.textSec,fontWeight:500}}>Sessão {s+1} de {TOTAL}</span>
                      </div>
                      <div style={{fontSize:16,fontWeight:600,color:t.text}}>{k}</div>
                      <div style={{fontSize:12,color:t.textSec,marginTop:3}}>{d.dayLabel} · {d.exercises.length} exercício{d.exercises.length!==1?"s":""}</div>
                    </div>
                    {!isDone&&<div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <button onClick={e=>{e.stopPropagation();setActive(k);setView("editWorkout")}} style={{width:40,height:40,borderRadius:12,background:t.cardAlt,border:"none",display:"flex",alignItems:"center",justifyContent:"center"}}><I d={IC.edit} s={16} c={t.textSec}/></button>
                      <div style={{width:46,height:46,borderRadius:14,background:isNext?`linear-gradient(135deg,${t.accent},${t.accentDark})`:t.cardAlt,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <I d={IC.play} s={20} c={isNext?"#fff":t.textSec}/>
                      </div>
                    </div>}
                  </div>
                  <div style={{display:"flex",gap:2,marginTop:14}}>
                    {w.sessions.map((x,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:x.status==="done"?(state.phases?PC[Math.floor(i/PPH)]:t.accent):x.status==="skipped"?t.border:i===s?`${t.accent}44`:t.cardAlt}}/>)}
                  </div>
                </div>
              );
            })}
            <button onClick={()=>setShowNewWk(true)} style={{padding:18,borderRadius:20,background:t.card,border:`2px dashed ${t.border}`,color:t.accent,fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <I d={IC.plus} s={18} c={t.accent}/>Novo treino
            </button>
          </div>
          <button onClick={()=>{if(confirm("Resetar todo o progresso?")){localStorage.removeItem(SK);setState(init())}}} style={{marginTop:28,width:"100%",padding:12,borderRadius:14,background:t.card,border:`1px solid ${t.border}`,color:t.textSec,fontSize:13,fontWeight:500}}>Resetar progresso</button>
        </div>
      </div>
      </TC.Provider>
    );
  }

  // ── EDIT WORKOUT ──
  if(view==="editWorkout"&&active){
    const k=active;const exs=td[k]?.exercises||[];
    return(
      <TC.Provider value={t}>
      <div style={{minHeight:"100dvh",maxWidth:480,margin:"0 auto",background:t.bg}}>
        {editEx&&<EditModal td={td} wk={editEx.wk} exIdx={editEx.idx} isNew={editEx.isNew} onSave={d=>saveExEdit(editEx.wk,editEx.idx,d)} onDelete={()=>deleteEx(editEx.wk,editEx.idx)} onClose={()=>setEditEx(null)}/>}
        <div style={{padding:"24px 20px 16px",display:"flex",alignItems:"center",gap:14}}>
          <button onClick={()=>{setActive(null);setView("home")}} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={IC.back} s={18} c={t.text}/></button>
          <div style={{flex:1}}><h1 style={{fontSize:18,fontWeight:700,color:t.text}}>Editar</h1><p style={{fontSize:12,color:t.textSec,margin:0}}>{k}</p></div>
          <button onClick={()=>{if(confirm(`Excluir treino "${k}"?`)){deleteWorkout(k);setActive(null);setView("home")}}} style={{background:t.redBg,border:"none",borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={IC.trash} s={18} c={t.red}/></button>
        </div>
        <div style={{padding:"0 20px 100px",display:"flex",flexDirection:"column",gap:8}}>
          {exs.map((ex,i)=>(
            <div key={i} onClick={()=>setEditEx({wk:k,idx:i})} style={{background:t.card,borderRadius:16,padding:16,border:`1px solid ${t.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:14,fontWeight:600,color:t.text}}>{ex.name}</div><div style={{fontSize:12,color:t.textSec,marginTop:2}}>{ex.sets}×{ex.reps} · {ex.rest}{ex.initWeight!=null?` · ${ex.initWeight}kg`:""} · {TL[ex.type]}</div></div>
              <I d={IC.edit} s={16} c={t.textSec}/>
            </div>
          ))}
          <button onClick={()=>setEditEx({wk:k,isNew:true})} style={{padding:16,borderRadius:16,background:t.card,border:`2px dashed ${t.border}`,color:t.accent,fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <I d={IC.plus} s={18} c={t.accent}/>Adicionar exercício
          </button>
        </div>
      </div>
      </TC.Provider>
    );
  }

  // ── HISTORY ──
  if(view==="history"){
    return(
      <TC.Provider value={t}>
      <div style={{minHeight:"100dvh",maxWidth:480,margin:"0 auto",background:t.bg}}>
        <div style={{padding:"24px 20px 16px",display:"flex",alignItems:"center",gap:14}}>
          <button onClick={()=>setView("home")} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={IC.back} s={18} c={t.text}/></button>
          <h1 style={{fontSize:20,fontWeight:700,color:t.text}}>Histórico</h1>
        </div>
        <div style={{padding:"0 20px 40px"}}>
          {WK.map(k=>{const w=state.w[k];if(!w)return null;const c=w.sessions.filter(s=>s.status==="done").length;
            return(<div key={k} style={{marginBottom:24}}>
              <h3 style={{fontSize:13,color:t.text,marginBottom:10,fontWeight:600}}>{k} <span style={{color:t.textSec,fontWeight:400}}>· {c} realizados</span></h3>
              {w.sessions.map((s,i)=>{if(!s.status)return null;const date=s.at?new Date(s.at).toLocaleDateString("pt-BR"):"";
                return(<div key={i} onClick={()=>{setHd({k,i});setView("detail")}} style={{padding:"12px 16px",background:t.card,borderRadius:14,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${t.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{width:28,height:28,borderRadius:8,background:s.status==="done"?t.accentBg:t.redBg,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={s.status==="done"?IC.check:IC.skip} s={14} c={s.status==="done"?t.accent:t.red}/></span>
                    <div><span style={{fontSize:13,fontWeight:600,color:t.text}}>Sessão {i+1}</span><span style={{fontSize:12,color:t.textSec,marginLeft:8}}>{date}</span></div>
                  </div>
                  <I d="M9 18l6-6-6-6" s={16} c={t.textSec}/>
                </div>)})}
            </div>)})}
        </div>
      </div>
      </TC.Provider>
    );
  }

  // ── DETAIL ──
  if(view==="detail"&&hd){
    const{k,i}=hd;const s=state.w[k]?.sessions[i];const exs=td[k]?.exercises||[];
    if(!s)return null;
    return(
      <TC.Provider value={t}>
      <div style={{minHeight:"100dvh",maxWidth:480,margin:"0 auto",background:t.bg}}>
        <div style={{padding:"24px 20px 16px",display:"flex",alignItems:"center",gap:14}}>
          <button onClick={()=>setView("history")} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={IC.back} s={18} c={t.text}/></button>
          <div><h1 style={{fontSize:18,fontWeight:700,color:t.text}}>Sessão {i+1}</h1><p style={{fontSize:12,color:t.textSec,margin:0}}>{k}</p></div>
        </div>
        <div style={{padding:"0 20px 40px",display:"flex",flexDirection:"column",gap:10}}>
          {exs.map((ex,j)=>{const d=s.exercises[j];if(!d)return null;
            return(<div key={j} style={{background:t.card,borderRadius:16,padding:16,border:`1px solid ${t.border}`}}>
              <div style={{fontSize:14,fontWeight:600,color:t.text}}>{ex.name}</div>
              <div style={{fontSize:12,color:t.textSec,marginTop:4}}>{d.weight!=null?`${d.weight} kg · `:""}{d.sets.filter(Boolean).length}/{ex.sets} séries</div>
            </div>)})}
        </div>
      </div>
      </TC.Provider>
    );
  }

  // ── WORKOUT ──
  if(view==="workout"&&active){
    const k=active;const w=state.w[k];if(!w)return null;
    const si=w.cur;const s=w.sessions[si];if(!s)return null;
    const exs=td[k]?.exercises||[];const p=ph(si);
    const ts=exs.reduce((a,e)=>a+e.sets,0);const ds=s.exercises.reduce((a,e)=>a+e.sets.filter(Boolean).length,0);const pct=ts?Math.round(ds/ts*100):0;
    return(
      <TC.Provider value={t}>
      <div style={{minHeight:"100dvh",maxWidth:480,margin:"0 auto",paddingBottom:130,background:t.bg}}>
        {timer&&<RestTimer seconds={timer} onClose={()=>setTimer(null)}/>}
        <div style={{padding:"24px 20px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:18}}>
            <button onClick={()=>setView("home")} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={IC.back} s={18} c={t.text}/></button>
            <div style={{flex:1}}>
              {state.phases&&<span style={{background:PC[p]+"18",color:PC[p],fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:100}}>{["Adaptação","Construção","Intensificação","Pico"][p]}</span>}
              <h1 style={{fontSize:18,fontWeight:700,marginTop:6,color:t.text}}>{k}</h1>
            </div>
            <div style={{fontSize:28,fontWeight:300,color:t.accent}}>Sessão {si+1}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{flex:1,height:4,background:t.cardAlt,borderRadius:2}}><div style={{height:4,borderRadius:2,background:`linear-gradient(90deg,${t.accent},${t.accentDark})`,width:`${pct}%`,transition:"width .3s"}}/></div>
            <span style={{fontSize:12,color:t.textSec,fontWeight:500}}>{ds}/{ts}</span>
          </div>
        </div>
        <div style={{padding:"0 20px",display:"flex",flexDirection:"column",gap:10}}>
          {exs.map((ex,i)=><ExCard key={i} ex={ex} data={s.exercises[i]||{weight:null,sets:[]}} onUpdate={d=>upEx(k,si,i,d)} onRest={s=>setTimer(s)} prog={getProgression(k,i,state)}/>)}
        </div>
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:`linear-gradient(transparent,${t.gradBot} 30%)`,padding:"40px 20px 28px",display:"flex",gap:10,maxWidth:480,margin:"0 auto"}}>
          <button onClick={()=>complete(k,"skipped")} style={{flex:1,padding:16,borderRadius:16,background:t.card,border:`1px solid ${t.border}`,color:t.textSec,fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <I d={IC.skip} s={16} c={t.textSec}/>Pular
          </button>
          <button onClick={()=>complete(k,"done")} style={{flex:2,padding:16,borderRadius:16,background:`linear-gradient(135deg,${t.accent},${t.accentDark})`,border:"none",color:"#fff",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <I d={IC.check} s={16} c="#fff"/>Concluir
          </button>
        </div>
      </div>
      </TC.Provider>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
